<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8: Async/Await Capstone</title>
    <style>
      body {
        max-width: 46rem;
        margin: 3rem auto;
        padding: 0 1rem;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }

      button,
      select {
        padding: 0.6rem 1rem;
      }

      button {
        cursor: pointer;
      }

      ol,
      pre {
        padding: 1rem;
        background: #f2f2f2;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Exercise 8: Async/Await Capstone</h1>

    <p>
      <label for="outcome">Character request:</label>
      <select id="outcome">
        <option value="success">Valid character</option>
        <option value="failure">Invalid character</option>
      </select>
      <button id="loadButton" type="button">Load mission data</button>
    </p>

    <p id="status">Ready</p>
    <ol id="steps"></ol>
    <pre id="result">No requests made.</pre>

    <script src="exercise.js"></script>
  </body>
</html>
