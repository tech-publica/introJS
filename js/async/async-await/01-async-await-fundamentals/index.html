<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async and Await Fundamentals</title>
    <style>
      body {
        max-width: 46rem;
        margin: 3rem auto;
        padding: 0 1rem;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }

      button {
        padding: 0.6rem 1rem;
        cursor: pointer;
      }

      #steps {
        min-height: 12rem;
        padding: 1rem 1rem 1rem 2.5rem;
        background: #f2f2f2;
      }

      .note {
        padding: 0.75rem;
        border-left: 0.3rem solid #2563eb;
        background: #eff6ff;
      }
    </style>
  </head>
  <body>
    <h1>Async and Await Fundamentals</h1>

    <p class="note">
      <code>await</code> pauses the current async function. It does not block the
      browser or pause all JavaScript.
    </p>

    <button id="startButton" type="button">Run demonstration</button>
    <button id="counterButton" type="button">Counter: 0</button>
    <p id="status">Ready</p>

    <h2>Execution order</h2>
    <ol id="steps"></ol>

    <h2>Result</h2>
    <pre id="result">No request made.</pre>

    <script src="script.js"></script>
  </body>
</html>
